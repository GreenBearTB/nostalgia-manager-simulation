# Database source files for Nostalgia Manager Simulation.
#
# By default the game loads the full real databases shipped in this folder:
#   ClubsDB.csv   (1,206 clubs)
#   PlayersDB.csv (19,505 players)
# These are Championship Manager / FM style exports and are loaded directly.
#
# Relative paths are resolved against this data/ folder; absolute paths are
# fine on Windows. Lines starting with # are comments.

players = PlayersDB.csv
clubs   = ClubsDB.csv

# To point at your own exports instead, change the lines above, e.g.:
# players = D:\DEV\Docs\Players db1 csv.csv
# clubs   = D:\DEV\Docs\Clubs.csv
